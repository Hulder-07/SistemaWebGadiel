        value: "767881232698992"
      - key: CLOUDINARY_API_SECRET
        value: "C-s2QypnBPmi6B4rgpAxQQ8fviE"

databases:
  - name: carwash-gadiel-db
    databaseName: carwash
    user: postgres
    plan: free
