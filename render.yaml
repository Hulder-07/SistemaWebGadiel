    name: carwash-gadiel-web
    env: docker
    region: ohio
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carwash-gadiel-db
          property: connectionString
      - key: DB_USERNAME
