<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Servicio</title></head>
<body>
<th:block layout:fragment="page-title" th:text="${servicio.id!=null}?'Editar Servicio':'Nuevo Servicio'">Servicio</th:block>
<th:block layout:fragment="content">
<div style="max-width:580px;">
  <div class="card">
    <div class="card-header">
      <div class="card-title"><div class="dot"></div>
        <span th:text="${servicio.id!=null}?'Editar Servicio':'Nuevo Servicio'"></span>
      </div>
    </div>
    <div style="padding:24px;">
      <form method="post" th:action="@{/servicios/guardar}" th:object="${servicio}">
        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" th:field="*{activo}" value="true"/>

        <div class="form-group">
          <label class="form-label">Nombre del servicio *</label>
          <input type="text" th:field="*{nombre}" class="form-control" required placeholder="Ej: Lavado Exterior Premium"/>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <textarea th:field="*{descripcion}" class="form-control" rows="2" placeholder="¿Qué incluye este servicio?"></textarea>
        </div>

        <!-- SELECTOR DE CATEGORÍA VISUAL -->
        <div class="form-group">
          <label class="form-label">Tipo de servicio *</label>
          <input type="hidden" th:field="*{categoria}" id="catServInput"/>
          <div class="serv-cat-grid">
            <div class="serv-cat-opt" data-val="basico" onclick="selServCat('basico')" th:classappend="${servicio.categoria=='basico'}?' selected':''">
              <i class="fa-solid fa-droplet"></i>
              <span>Básico</span>
              <small>Lavado rápido exterior</small>
            </div>
            <div class="serv-cat-opt" data-val="completo" onclick="selServCat('completo')" th:classappend="${servicio.categoria=='completo'}?' selected':''">
              <i class="fa-solid fa-car-wash"></i>
              <span>Completo</span>
              <small>Interior + exterior</small>
            </div>
            <div class="serv-cat-opt" data-val="premium" onclick="selServCat('premium')" th:classappend="${servicio.categoria=='premium'}?' selected':''">
              <i class="fa-solid fa-crown"></i>
              <span>Premium</span>
              <small>Servicio completo deluxe</small>
            </div>
            <div class="serv-cat-opt" data-val="detailing" onclick="selServCat('detailing')" th:classappend="${servicio.categoria=='detailing'}?' selected':''">
              <i class="fa-solid fa-gem"></i>
              <span>Detailing</span>
              <small>Detalle profesional</small>
            </div>
            <div class="serv-cat-opt" data-val="especial" onclick="selServCat('especial')" th:classappend="${servicio.categoria=='especial'}?' selected':''">
              <i class="fa-solid fa-bolt"></i>
              <span>Especial</span>
              <small>Servicio único</small>
            </div>
            <div class="serv-cat-opt" data-val="moto" onclick="selServCat('moto')" th:classappend="${servicio.categoria=='moto'}?' selected':''">
              <i class="fa-solid fa-motorcycle"></i>
              <span>Moto</span>
              <small>Para motocicletas</small>
            </div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(4, 1fr);gap:10px; margin-bottom: 12px; margin-top:16px;">
          <div class="form-group">
            <label class="form-label" style="font-size: 11px;">Precio Moto/Base *</label>
            <input type="number" th:field="*{precio}" step="0.50" min="0" class="form-control" required placeholder="0.00"/>
          </div>
          <div class="form-group">
            <label class="form-label" style="font-size: 11px;">Precio Auto</label>
            <input type="number" th:field="*{precioAuto}" step="0.50" min="0" class="form-control" placeholder="0.00"/>
          </div>
          <div class="form-group">
            <label class="form-label" style="font-size: 11px;">Precio Camioneta</label>
            <input type="number" th:field="*{precioCamioneta}" step="0.50" min="0" class="form-control" placeholder="0.00"/>
          </div>
          <div class="form-group">
            <label class="form-label" style="font-size: 11px;">Precio Van/Camión</label>
            <input type="number" th:field="*{precioVan}" step="0.50" min="0" class="form-control" placeholder="0.00"/>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:20px;">
          <label class="form-label">Duración estimada (min)</label>
          <input type="number" th:field="*{duracionMinutos}" min="5" step="5" class="form-control" style="width: 120px;" placeholder="30"/>
        </div>

        <div style="display:flex;gap:12px;margin-top:8px;">
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Guardar Servicio</button>
          <a th:href="@{/servicios}" class="btn btn-outline">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
.serv-cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px;}
.serv-cat-opt{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .17s ease;background:var(--bg-card);text-align:center;}
.serv-cat-opt:hover{border-color:var(--accent);background:var(--accent-glow);}
.serv-cat-opt.selected{border-color:var(--accent);background:var(--accent);color:#fff;}
.serv-cat-opt i{font-size:20px;color:var(--accent);}
.serv-cat-opt.selected i{color:#fff!important;}
.serv-cat-opt span{font-size:12.5px;font-weight:700;color:var(--text-primary);}
.serv-cat-opt.selected span{color:#fff;}
.serv-cat-opt small{font-size:10.5px;color:var(--text-muted);line-height:1.3;}
.serv-cat-opt.selected small{color:rgba(255,255,255,.75);}
</style>
</th:block>
<th:block layout:fragment="scripts">
<script>
function selServCat(val){
  document.getElementById('catServInput').value=val;
  document.querySelectorAll('.serv-cat-opt').forEach(o=>o.classList.toggle('selected',o.dataset.val===val));
}
window.addEventListener('DOMContentLoaded',function(){
  const v=document.getElementById('catServInput').value;
  if(v) document.querySelectorAll('.serv-cat-opt').forEach(o=>o.classList.toggle('selected',o.dataset.val===v));
});
</script>
</th:block>
</body>
</html>
