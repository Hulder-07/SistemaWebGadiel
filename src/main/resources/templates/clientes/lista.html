<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Clientes</title></head>
<body>
<div layout:fragment="page-title">Clientes</div>
<div layout:fragment="content">

<div th:if="${msg}" class="alert-box success" th:text="${msg}"></div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
  <div style="position:relative;">
    <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px;"></i>
    <input type="text" id="buscarCliente" class="form-control" placeholder="Buscar por nombre, DNI o teléfono..." style="padding-left:34px;width:300px;" oninput="buscarClientes(this.value)"/>
  </div>
  <a th:href="@{/clientes/nuevo}" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Nuevo Cliente</a>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-title"><div class="dot"></div>Listado de Clientes</div>
    <span id="cntClientes" style="font-size:12px;color:var(--text-muted);"></span>
  </div>
  <table id="tablaClientes">
    <thead>
      <tr><th>Cliente</th><th>DNI</th><th>Teléfono</th><th>Email</th><th>Dirección</th><th>Acciones</th></tr>
    </thead>
    <tbody>
      <tr th:each="c : ${clientes}"
          th:attr="data-busca=${#strings.toLowerCase(c.nombre+' '+(c.dni?:'')+(c.telefono?:''))}">
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:34px;height:34px;border-radius:50%;background:var(--accent-glow);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--accent);flex-shrink:0;"
                 th:text="${#strings.substring(c.nombre,0,1).toUpperCase()}">A</div>
            <div>
              <div style="font-weight:700;" th:text="${c.nombre}"></div>
            </div>
          </div>
        </td>
        <td th:text="${c.dni?:'-'}"></td>
        <td>
          <span th:if="${c.telefono!=null}">
            <i class="fa-solid fa-phone" style="font-size:11px;color:var(--text-muted);margin-right:4px;"></i>
            <span th:text="${c.telefono}"></span>
          </span>
          <span th:if="${c.telefono==null}" style="color:var(--text-muted);">—</span>
        </td>
        <td th:text="${c.email?:'-'}"></td>
        <td style="font-size:12.5px;color:var(--text-muted);" th:text="${c.direccion?:'-'}"></td>
        <td>
          <div style="display:flex;gap:6px;">
            <a th:href="@{/clientes/{id}/detalle(id=${c.id})}" class="btn btn-sm btn-outline" title="Ver historial">
              <i class="fa-solid fa-eye"></i>
            </a>
            <a th:href="@{/ordenes/nueva}" class="btn btn-sm btn-primary" title="Nueva orden">
              <i class="fa-solid fa-soap"></i>
            </a>
            <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn btn-sm btn-outline" title="Editar">
              <i class="fa-solid fa-pen"></i>
            </a>
            <a th:href="@{/clientes/eliminar/{id}(id=${c.id})}" class="btn btn-sm btn-outline"
               onclick="return confirm('¿Eliminar cliente?')" title="Eliminar">
              <i class="fa-solid fa-trash" style="color:#e74c3c;"></i>
            </a>
          </div>
        </td>
      </tr>
      <tr id="sinCliente" style="display:none;">
        <td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted);">
          <i class="fa-solid fa-search" style="font-size:24px;display:block;margin-bottom:8px;opacity:.4;"></i>
          No se encontraron clientes
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(clientes)}">
        <td colspan="6" class="empty-state"><i class="fa-solid fa-users"></i><p>No hay clientes registrados</p></td>
      </tr>
    </tbody>
  </table>
</div>
</th:block>
<th:block layout:fragment="scripts">
<script>
function buscarClientes(q){
  q=q.toLowerCase();
  const filas=document.querySelectorAll('#tablaClientes tbody tr[data-busca]');
  let vis=0;
  filas.forEach(tr=>{const ok=!q||tr.dataset.busca.includes(q);tr.style.display=ok?'':'none';if(ok)vis++;});
  document.getElementById('sinCliente').style.display=vis===0&&q?'':'none';
  document.getElementById('cntClientes').textContent=vis+' cliente(s)';
}
window.addEventListener('DOMContentLoaded',()=>buscarClientes(''));
</script>
</th:block>
</body>
</html>
