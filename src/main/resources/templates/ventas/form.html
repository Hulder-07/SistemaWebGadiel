<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
<title>Nueva Venta</title>
<style>
.filter-btn{padding:5px 16px;border-radius:20px;font-size:12.5px;font-weight:600;text-decoration:none;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-secondary);transition:all .15s;cursor:pointer;display:inline-block;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.prod-venta-card{background:var(--bg-card);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm);transition:all .2s;cursor:pointer;}
.prod-venta-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.prod-venta-card.agotado{opacity:.65;cursor:default;}
.prod-venta-card.agotado:hover{transform:none;box-shadow:var(--shadow-sm);}
.prod-img-area{height:140px;background:#f8f8f8;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.prod-img-area img{width:100%;height:100%;object-fit:cover;}
.prod-icon-ph{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;}
.estado-badge{position:absolute;top:8px;right:8px;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;color:#fff;}
.cat-label{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.45);color:#fff;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;}
.qty-badge{display:none;position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;font-size:12px;font-weight:800;align-items:center;justify-content:center;}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg-card);cursor:pointer;font-size:16px;font-weight:700;color:var(--text-primary);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.qty-btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-agregar{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;transition:background .15s;}
.btn-agregar:hover{background:#a93226;}

/* ✅ CORREGIDO: carrito sticky con altura dinámica y scroll solo en los items */
.carrito-panel {
  position: sticky;
  top: 80px;
  max-height: calc(100vh - 100px);
  display: flex;
  flex-direction: column;
}
.carrito-panel .card {
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 100px);
  overflow: hidden;
}
/* Header del carrito: fijo arriba */
.carrito-panel .card-header {
  flex-shrink: 0;
}
/* Estado vacío */
#carritoVacio {
  flex-shrink: 0;
}
/* ✅ Items: scroll solo aquí, crece hasta llenar espacio disponible */
#carritoItems {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
/* Footer: siempre visible abajo, nunca se oculta */
#carritoFooter {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}

.carrito-total-box{background:linear-gradient(135deg,#1a0a0a,#2d1010);border-radius:10px;padding:14px;margin-bottom:14px;}
.carrito-total-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.carrito-total-val{font-size:26px;font-weight:800;color:#e74c3c;}
.btn-registrar{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14.5px;font-weight:700;cursor:pointer;transition:background .2s;box-shadow:0 4px 14px rgba(192,57,43,.3);}
.btn-registrar:hover{background:#a93226;}
</style>
</head>
<body>
<div layout:fragment="page-title">Nueva Venta</div>
<div layout:fragment="content">

<div th:if="${error}" class="alert-box danger">
  <i class="fa-solid fa-triangle-exclamation"></i> <span th:text="${error}"></span>
</div>

<div style="display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;">

  <!-- ── PRODUCTOS ── -->
  <div>
    <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:10px;">
      Selecciona los productos
    </div>

    <!-- Filtros categoría -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;">
      <a th:href="@{/ventas/nueva}"
         th:classappend="${categoriaActual == null} ? ' active' : ''"
         class="filter-btn">Todos</a>
      <a th:each="cat : ${categorias}"
         th:href="@{/ventas/nueva/categoria/{id}(id=${cat.id})}"
         th:text="${cat.nombre}"
         th:classappend="${categoriaActual != null and categoriaActual == cat.id} ? ' active' : ''"
         class="filter-btn"></a>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(productos)}"
         style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;text-align:center;color:var(--text-muted);">
      <i class="fa-solid fa-box-open" style="font-size:36px;display:block;margin-bottom:10px;opacity:.2;"></i>
      No hay productos en esta categoría
    </div>

    <!-- Grid de productos -->
    <div th:unless="${#lists.isEmpty(productos)}"
         style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;">

      <div th:each="p : ${productos}"
           th:id="'card-' + ${p.id}"
           th:classappend="${p.stock == 0} ? ' agotado' : ''"
           class="prod-venta-card"
           th:attr="data-id=${p.id},data-nombre=${p.nombre},data-precio=${p.precio},data-stock=${p.stock},data-unidad=${p.unidad ?: 'und'},data-imagen=${p.imagen ?: ''},data-categoria=${p.categoria != null ? p.categoria.nombre : ''},data-icono=${p.categoria != null ? p.categoria.icono : ''},data-color=${p.categoria != null ? p.categoria.color : '#c0392b'}">

        <!-- Imagen -->
        <div class="prod-img-area">
          <img th:if="${p.imagen != null and !p.imagen.isEmpty()}" th:src="${p.imagen}"/>
          <div th:if="${p.imagen == null or p.imagen.isEmpty()}"
               class="prod-icon-ph"
               th:style="'background:' + (${p.categoria != null ? p.categoria.color : '#c0392b'}) + '22;color:' + (${p.categoria != null ? p.categoria.color : '#c0392b'})">
            <i th:class="${p.categoria != null and p.categoria.icono != null} ? p.categoria.icono : 'fa-solid fa-box'"></i>
          </div>

          <!-- Badge estado -->
          <div th:if="${p.stock == 0}"
               class="estado-badge" style="background:rgba(231,76,60,.9);">Sin stock</div>
          <div th:if="${p.stock > 0 and p.stock <= p.stockMinimo}"
               class="estado-badge" style="background:rgba(243,156,18,.9);">
            <i class="fa-solid fa-triangle-exclamation"></i> Últimas unidades
          </div>
          <div th:if="${p.stock > p.stockMinimo}"
               class="estado-badge" style="background:rgba(39,174,96,.85);">Disponible</div>

          <!-- Categoría -->
          <div th:if="${p.categoria != null}" class="cat-label" th:text="${p.categoria.nombre}"></div>

          <!-- Badge cantidad en carrito -->
          <div th:id="'badge-' + ${p.id}" class="qty-badge"></div>
        </div>

        <!-- Info -->
        <div style="padding:12px;">
          <div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
               th:text="${p.nombre}"></div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;"
               th:text="${p.categoria != null ? p.categoria.nombre : '-'}"></div>
          <div style="font-size:11px;color:var(--text-secondary);margin-bottom:6px;font-weight:600;"
               th:text="'Stock: ' + ${p.stock} + ' ' + ${p.unidad ?: 'und'}"></div>
          <div style="font-size:18px;font-weight:800;color:var(--accent);margin-bottom:10px;"
               th:text="'S/ ' + ${#numbers.formatDecimal(p.precio,1,2)}"></div>

          <!-- Sin stock -->
          <div th:if="${p.stock == 0}"
               style="text-align:center;padding:9px;background:var(--bg-main);color:var(--text-muted);border-radius:8px;font-size:12.5px;font-weight:700;">
            Sin stock
          </div>

          <!-- Disponible -->
          <th:block th:if="${p.stock > 0}">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
              <button th:attr="onclick='cambiarCantidad(' + ${p.id} + ',-1)'" class="qty-btn">−</button>
              <input th:id="'qty-' + ${p.id}" type="number" min="0" th:max="${p.stock}" value="0"
                     style="flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--text-primary);border:1.5px solid var(--border);border-radius:8px;padding:4px;outline:none;font-family:inherit;background:var(--bg-card);"/>
              <button th:attr="onclick='cambiarCantidad(' + ${p.id} + ',1)'" class="qty-btn">+</button>
            </div>
            <button th:attr="onclick='agregarAlCarrito(' + ${p.id} + ')'" class="btn-agregar">
              <i class="fa-solid fa-cart-plus"></i> Agregar
            </button>
          </th:block>
        </div>
      </div>

    </div>
  </div>

  <!-- ── CARRITO ── -->
  <div class="carrito-panel">
    <div class="card">
      <div class="card-header">
        <div class="card-title"><div class="dot"></div> Carrito</div>
        <button onclick="limpiarCarrito()"
                style="font-size:11.5px;color:#e74c3c;background:none;border:none;cursor:pointer;font-weight:600;">
          Limpiar
        </button>
      </div>

      <div id="carritoVacio" style="padding:28px;text-align:center;color:var(--text-muted);font-size:13px;">
        <i class="fa-solid fa-cart-shopping" style="font-size:32px;display:block;margin-bottom:10px;opacity:.2;"></i>
        Agrega productos al carrito
      </div>

      <!-- ✅ Sin max-height fijo, el CSS flex se encarga del scroll -->
      <div id="carritoItems" style="display:none;"></div>

      <div id="carritoFooter" style="display:none;padding:16px;">
        <div class="form-group" style="margin-bottom:12px;">
          <label style="font-size:12px;font-weight:700;color:var(--text-secondary);">Cliente</label>
          <input type="text" id="clienteInput" placeholder="Nombre del cliente (opcional)"
                 class="form-control" style="margin-top:4px;"/>
        </div>
        <div class="form-group" style="margin-bottom:14px;">
          <label style="font-size:12px;font-weight:700;color:var(--text-secondary);">DNI / RUC</label>
          <input type="text" id="dniInput" placeholder="DNI o RUC (opcional)"
                 maxlength="11" class="form-control" style="margin-top:4px;"/>
        </div>

        <div class="carrito-total-box">
          <div class="carrito-total-lbl">Total a pagar</div>
          <div id="totalDisplay" class="carrito-total-val">S/ 0.00</div>
        </div>

        <button onclick="procesarVentas()" class="btn-registrar">
          <i class="fa-solid fa-check"></i> Registrar Venta
        </button>
        <a th:href="@{/ventas}"
           style="display:block;text-align:center;margin-top:10px;font-size:13px;color:var(--text-muted);text-decoration:none;">
          Cancelar
        </a>
      </div>
    </div>
  </div>

</div>

<div id="formsContainer"></div>

</div>
<th:block layout:fragment="scripts">
<script>
  const productosData = {};
  document.querySelectorAll('[data-id]').forEach(card => {
    productosData[card.dataset.id] = {
      nombre:    card.dataset.nombre,
      precio:    parseFloat(card.dataset.precio),
      stock:     parseInt(card.dataset.stock),
      unidad:    card.dataset.unidad,
      imagen:    card.dataset.imagen,
      categoria: card.dataset.categoria,
      icono:     card.dataset.icono,
      color:     card.dataset.color
    };
  });

  let carrito = {};

  function cambiarCantidad(id, delta) {
    const p = productosData[id];
    if (!p) return;
    const qtyEl = document.getElementById('qty-' + id);
    let qty = parseInt(qtyEl.value) + delta;
    if (qty < 0) qty = 0;
    if (qty > p.stock) { alert('Stock máximo: ' + p.stock); return; }
    qtyEl.value = qty;
  }

  function agregarAlCarrito(id) {
    const p   = productosData[id];
    const qty = parseInt(document.getElementById('qty-' + id).value);
    if (!qty || qty === 0) { alert('Selecciona una cantidad mayor a 0.'); return; }
    if (qty > p.stock)     { alert('Stock máximo: ' + p.stock); return; }
    if (carrito[id]) {
      carrito[id].cantidad += qty;
      if (carrito[id].cantidad > p.stock) carrito[id].cantidad = p.stock;
    } else {
      carrito[id] = { ...p, cantidad: qty };
    }
    document.getElementById('qty-' + id).value = '0';
    const badge = document.getElementById('badge-' + id);
    if (badge) { badge.textContent = carrito[id].cantidad; badge.style.display = 'flex'; }
    renderCarrito();
  }

  function quitarDelCarrito(id) {
    delete carrito[id];
    const qtyEl = document.getElementById('qty-' + id);
    if (qtyEl) qtyEl.value = '0';
    const badge = document.getElementById('badge-' + id);
    if (badge) badge.style.display = 'none';
    renderCarrito();
  }

  function limpiarCarrito() {
    Object.keys(carrito).forEach(id => {
      const q = document.getElementById('qty-' + id);
      if (q) q.value = '0';
      const b = document.getElementById('badge-' + id);
      if (b) b.style.display = 'none';
    });
    carrito = {};
    renderCarrito();
  }

  function iconHtml(item) {
    if (item.imagen) return `<img src="${item.imagen}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0;"/>`;
    const color = item.color || '#c0392b';
    const ico   = item.icono || 'fa-solid fa-box';
    return `<div style="width:36px;height:36px;border-radius:8px;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;"><i class="${ico}"></i></div>`;
  }

  function renderCarrito() {
    const items    = Object.entries(carrito);
    const itemsDiv = document.getElementById('carritoItems');
    const vacioDiv = document.getElementById('carritoVacio');
    const footer   = document.getElementById('carritoFooter');
    if (items.length === 0) {
      vacioDiv.style.display = 'block';
      itemsDiv.style.display = 'none';
      footer.style.display   = 'none';
      document.getElementById('totalDisplay').textContent = 'S/ 0.00';
      return;
    }
    vacioDiv.style.display = 'none';
    itemsDiv.style.display = 'block';
    footer.style.display   = 'block';
    let html = '', total = 0;
    items.forEach(([id, item]) => {
      const sub = item.precio * item.cantidad;
      total += sub;
      html += `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);">
          ${iconHtml(item)}
          <div style="flex:1;min-width:0;">
            <div style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.nombre}</div>
            <div style="font-size:11px;color:var(--text-muted);">S/ ${item.precio.toFixed(2)} x ${item.cantidad} ${item.unidad}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:13px;font-weight:700;color:var(--accent);">S/ ${sub.toFixed(2)}</div>
            <button onclick="quitarDelCarrito(${id})"
                    style="font-size:10px;color:#e74c3c;background:none;border:none;cursor:pointer;margin-top:2px;">✕ quitar</button>
          </div>
        </div>`;
    });
    itemsDiv.innerHTML = html;
    document.getElementById('totalDisplay').textContent = 'S/ ' + total.toFixed(2);
  }

  function procesarVentas() {
    const items = Object.entries(carrito);
    if (items.length === 0) { alert('Agrega productos al carrito.'); return; }
    const cliente      = document.getElementById('clienteInput').value.trim() || 'Cliente general';
    const dni          = document.getElementById('dniInput').value.trim() || '00000000';
    const numeroBoleta = 'BOL-' + Date.now();
    const container    = document.getElementById('formsContainer');
    const baseUrl      = /*[[@{/ventas/guardar}]]*/ '/ventas/guardar';
    container.innerHTML = '';
    items.forEach(([id, item]) => {
      const form = document.createElement('form');
      form.method = 'post'; form.action = baseUrl; form.style.display = 'none';
      const add = (name, value) => { const i = document.createElement('input'); i.type='hidden'; i.name=name; i.value=value; form.appendChild(i); };
      add('productoId',    id);
      add('cantidad',      item.cantidad);
      add('cliente',       cliente);
      add('dniCliente',    dni);
      add('numeroBoleta',  numeroBoleta);
      container.appendChild(form);
    });
    const forms = container.querySelectorAll('form');
    let index = 0;
    function enviarSiguiente() {
      if (index < forms.length - 1) {
        fetch(baseUrl, { method:'POST', body: new FormData(forms[index++]) }).then(enviarSiguiente);
      } else {
        forms[index].submit();
      }
    }
    enviarSiguiente();
  }
</script>
</th:block>
</body>
</html>
