<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Órdenes de Servicio</title></head>
<body>
<div layout:fragment="page-title">órdenes de Servicio</div>
<div layout:fragment="content">

<div th:if="${msg}"   class="alert-box success" th:text="${msg}"></div>
<div th:if="${error}" class="alert-box danger"  th:text="${error}"></div>

<!-- FILTROS + BÚSQUEDA -->
<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
  <a th:href="@{/ordenes}" class="cat-btn" th:classappend="${estadoFiltro==null}?' active':''">
    <i class="fa-solid fa-border-all"></i> Todas
  </a>
  <a th:href="@{/ordenes(estado='PENDIENTE')}" class="cat-btn" th:classappend="${estadoFiltro=='PENDIENTE'}?' active':''">
    <i class="fa-solid fa-clock"></i> Pendientes
    <span class="nav-badge" style="position:static;margin-left:4px;" th:text="${pendientes}" th:if="${pendientes>0}"></span>
  </a>
  <a th:href="@{/ordenes(estado='EN_PROCESO')}" class="cat-btn" th:classappend="${estadoFiltro=='EN_PROCESO'}?' active':''">
    <i class="fa-solid fa-spinner"></i> En Proceso
    <span class="nav-badge" style="position:static;margin-left:4px;background:var(--info);" th:text="${enProceso}" th:if="${enProceso>0}"></span>
  </a>
  <a th:href="@{/ordenes(estado='COMPLETADO')}" class="cat-btn" th:classappend="${estadoFiltro=='COMPLETADO'}?' active':''">
    <i class="fa-solid fa-check"></i> Completados
  </a>
  <a th:href="@{/ordenes(estado='CANCELADO')}" class="cat-btn" th:classappend="${estadoFiltro=='CANCELADO'}?' active':''">
    <i class="fa-solid fa-xmark"></i> Cancelados
  </a>
  <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
    <div style="position:relative;">
      <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px;"></i>
      <input type="text" id="buscarOrden" class="form-control" placeholder="Buscar placa o N° orden..." style="padding-left:32px;width:220px;padding-top:7px;padding-bottom:7px;" oninput="buscarOrdenes(this.value)"/>
    </div>
    <a th:href="@{/ordenes/nueva}" class="btn btn-primary">
      <i class="fa-solid fa-plus"></i> Nueva Orden
    </a>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-title"><div class="dot"></div>Listado de Órdenes</div>
    <span id="cntOrdenes" style="font-size:12px;color:var(--text-muted);"></span>
  </div>
  <table id="tablaOrdenes">
    <thead>
      <tr>
        <th>N° Orden</th><th>Placa / Vehículo</th><th>Cliente</th><th>Servicio</th>
        <th>Estado</th><th>Total</th><th>Fecha</th><th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="o : ${ordenes}"
          th:attr="data-busca=${#strings.toLowerCase(o.numeroOrden+' '+o.vehiculo.placa)}">
        <td><span class="mono" th:text="${o.numeroOrden}"></span></td>
        <td>
          <div style="font-weight:700;" th:text="${o.vehiculo.placa}"></div>
          <div style="font-size:12px;color:var(--text-muted);" th:text="${o.vehiculo.marca+' '+o.vehiculo.modelo}"></div>
        </td>
        <td th:text="${o.vehiculo.cliente!=null?o.vehiculo.cliente.nombre:'-'}"></td>
        <td>
          <div th:text="${o.servicio.nombre}"></div>
          <div style="font-size:11px;color:var(--text-muted);" th:text="${o.servicio.categoria}"></div>
        </td>
        <td>
          <span th:classappend="${o.estado=='COMPLETADO'}?'pill-active':(${o.estado=='EN_PROCESO'}?'pill-info':(${o.estado=='CANCELADO'}?'pill-critical':'pill-low'))"
                class="pill" th:text="${o.estado}"></span>
        </td>
        <td style="font-weight:700;color:var(--accent);" th:text="'S/ '+${#numbers.formatDecimal(o.total,1,'COMMA',2,'POINT')}"></td>
        <td style="font-size:12.5px;" th:text="${#temporals.format(o.fechaInicio,'dd/MM/yy HH:mm')}"></td>
        <td>
          <div style="display:flex;gap:6px;">
            <a th:href="@{/ordenes/{id}/detalle(id=${o.id})}" class="btn btn-sm btn-outline" title="Ver detalle">
              <i class="fa-solid fa-eye"></i>
            </a>
            <a th:href="@{/ordenes/{id}/pdf(id=${o.id})}" class="btn btn-sm btn-outline" title="Descargar PDF">
              <i class="fa-solid fa-file-pdf" style="color:#e74c3c;"></i>
            </a>
            <a th:href="@{/sunat/emitir/orden/{id}(id=${o.id})}" class="btn btn-sm btn-outline" title="Emitir Factura/Boleta">
              <i class="fa-solid fa-file-invoice-dollar" style="color:var(--green);"></i>
            </a>
            <a th:href="@{/ordenes/{id}/eliminar(id=${o.id})}" class="btn btn-sm btn-outline"
               onclick="return confirm('¿Eliminar esta orden?')" title="Eliminar">
              <i class="fa-solid fa-trash" style="color:#e74c3c;"></i>
            </a>
          </div>
        </td>
      </tr>
      <tr id="sinOrden" style="display:none;">
        <td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted);">
          <i class="fa-solid fa-search" style="font-size:24px;display:block;margin-bottom:8px;opacity:.4;"></i>
          No se encontraron órdenes
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(ordenes)}">
        <td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted);">
          <i class="fa-solid fa-inbox" style="font-size:28px;display:block;margin-bottom:8px;opacity:.4;"></i>
          No hay órdenes registradas
        </td>
      </tr>
    </tbody>
  </table>
</div>

</th:block>
<th:block layout:fragment="scripts">
<script>
function buscarOrdenes(q){
  q=q.toLowerCase();
  const filas=document.querySelectorAll('#tablaOrdenes tbody tr[data-busca]');
  let vis=0;
  filas.forEach(tr=>{const ok=!q||tr.dataset.busca.includes(q);tr.style.display=ok?'':'none';if(ok)vis++;});
  document.getElementById('sinOrden').style.display=vis===0&&q?'':'none';
  document.getElementById('cntOrdenes').textContent=vis+' orden(es)';
}
window.addEventListener('DOMContentLoaded',()=>buscarOrdenes(''));
</script>
</th:block>
</body>
</html>
