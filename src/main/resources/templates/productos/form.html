<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Producto</title></head>
<body>
<div layout:fragment="page-title" th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}">Producto</div>
<div layout:fragment="content">

<div style="max-width:620px;">
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <div class="dot"></div>
        <span th:text="${producto.id == null ? 'Registrar nuevo producto' : 'Editar producto'}"></span>
      </div>
    </div>
    <div style="padding:24px;">
      <form th:action="@{/productos/guardar}" th:object="${producto}"
            method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" th:field="*{imagen}"/>
        <input type="hidden" th:field="*{activo}" value="true"/>

        <!-- Nombre -->
        <div class="form-group" style="margin-bottom:16px;">
          <label style="font-size:13px;font-weight:700;color:var(--text-secondary);">Nombre *</label>
          <input class="form-control" type="text" th:field="*{nombre}"
                 placeholder="Ej: Silicona Premium 4L" required/>
        </div>

        <!-- Descripción -->
        <div class="form-group" style="margin-bottom:16px;">
          <label style="font-size:13px;font-weight:700;color:var(--text-secondary);">Descripción</label>
          <textarea class="form-control" th:field="*{descripcion}" rows="2"
                    placeholder="Descripción breve del producto"></textarea>
        </div>

        <!-- Categoría + Unidad -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;">
          <div class="form-group">
            <label style="font-size:13px;font-weight:700;color:var(--text-secondary);">
              Categoría
              <a th:href="@{/categorias/nueva}" target="_blank"
                 style="font-size:11px;color:var(--accent);margin-left:6px;font-weight:600;">
                <i class="fa-solid fa-plus"></i> Nueva
              </a>
            </label>
            <select class="form-control" name="categoriaId">
              <option value="">— Sin categoría —</option>
              <option th:each="cat : ${categorias}"
                      th:value="${cat.id}"
                      th:text="${cat.nombre}"
                      th:selected="${producto.categoria != null and producto.categoria.id == cat.id}">
              </option>
            </select>
          </div>
          <div class="form-group">
            <label style="font-size:13px;font-weight:700;color:var(--text-secondary);">Unidad</label>
            <select class="form-control" th:field="*{unidad}">
              <option value="und">Unidad</option>
              <option value="ml">ML (mililitros)</option>
              <option value="L">Litro</option>
              <option value="kg">Kilogramo</option>
              <option value="g">Gramo</option>
            </select>
          </div>
        </div>

        <!-- Precio + Stock + Mínimo -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px;">
          <div class="form-group">
            <label style="font-size:13px;font-weight:700;color:var(--text-secondary);">Precio (S/) *</label>
            <input class="form-control" type="number" step="0.01" min="0"
                   th:field="*{precio}" placeholder="0.00" required/>
          </div>
          <div class="form-group">
            <label style="font-size:13px;font-weight:700;color:var(--text-secondary);">Stock actual</label>
            <input class="form-control" type="number" min="0" th:field="*{stock}" placeholder="0"/>
          </div>
          <div class="form-group">
            <label style="font-size:13px;font-weight:700;color:var(--text-secondary);">Stock mínimo</label>
            <input class="form-control" type="number" min="0" th:field="*{stockMinimo}" placeholder="5"/>
          </div>
        </div>

        <!-- IMAGEN con preview -->
        <div class="form-group" style="margin-bottom:20px;">
          <label style="font-size:13px;font-weight:700;color:var(--text-secondary);">Imagen del producto</label>
          <div style="display:flex;align-items:center;gap:16px;margin-top:8px;">
            <!-- Preview -->
            <div style="width:90px;height:90px;border-radius:12px;border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;background:#f8f8f8;flex-shrink:0;">
              <img id="preview"
                   th:src="${producto.imagen}"
                   th:style="${producto.imagen != null and !producto.imagen.isEmpty()} ? 'display:block;width:100%;height:100%;object-fit:cover;' : 'display:none;'"
                   alt="preview"/>
              <i id="iconPreview"
                 class="fa-solid fa-image"
                 th:style="${producto.imagen == null or producto.imagen.isEmpty()} ? 'display:block;font-size:32px;color:#ccc;' : 'display:none;'"></i>
            </div>
            <div style="flex:1;">
              <input type="file" name="imagenFile" accept="image/*"
                     onchange="previewImagen(this)"
                     class="form-control" style="cursor:pointer;"/>
              <div style="font-size:11px;color:var(--text-muted);margin-top:5px;">
                JPG, PNG, WEBP — máx. 10MB. Si ya hay imagen y no subes nueva, se conserva la actual.
              </div>
            </div>
          </div>
        </div>

        <!-- Botones -->
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-floppy-disk"></i> Guardar Producto
          </button>
          <a th:href="@{/productos}" class="btn btn-outline">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

</div>
<th:block layout:fragment="scripts">
<script>
function previewImagen(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const img  = document.getElementById('preview');
      const icon = document.getElementById('iconPreview');
      img.src = e.target.result;
      img.style.display = 'block';
      icon.style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
</th:block>
</body>
</html>
