<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Productos</title></head>
<body>
<div layout:fragment="page-title">Productos</div>
<div layout:fragment="content">

<div th:if="${msg}" class="alert-box success"><i class="fa-solid fa-check-circle"></i> <span th:text="${msg}"></span></div>

<!-- HEADER -->
<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:12px;">
  <div> 
    <div style="font-size:20px;font-weight:800;color:var(--text-primary);font-family:var(--font-display);letter-spacing:-.4px;">Catálogo de Productos</div>
    <div style="font-size:13px;color:var(--text-muted);margin-top:2px;"
         th:text="${#lists.size(productos)} + ' productos registrados'"></div>

    <!-- Filtros por categoría -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;margin-bottom:4px;">
      <a th:href="@{/productos}"
         th:classappend="${categoriaActual == null} ? ' active' : ''"
         class="filter-btn"><i class="fa-solid fa-border-all"></i> Todos</a>
      <a th:each="cat : ${categorias}"
         th:href="@{/productos/categoria/{id}(id=${cat.id})}"
         th:text="${cat.nombre}"
         th:classappend="${categoriaActual != null and categoriaActual == cat.id} ? ' active' : ''"
         class="filter-btn"></a>
    </div>
  </div>

  <div style="display:flex;gap:10px;align-items:center;margin-top:4px;">
    <a th:href="@{/productos/nuevo}" class="btn btn-primary">
      <i class="fa-solid fa-plus"></i> Nuevo Producto
    </a>
  </div>
</div>

<!-- EMPTY STATE -->
<div th:if="${#lists.isEmpty(productos)}" class="card" style="text-align:center;padding:60px;">
  <i class="fa-solid fa-box-open" style="font-size:48px;opacity:.2;display:block;margin-bottom:14px;"></i>
  No hay productos en esta categoría.
  <a th:href="@{/productos/nuevo}" style="color:var(--accent);">Agregar uno</a>
</div>

<!-- GRID DE CARDS -->
<div th:unless="${#lists.isEmpty(productos)}" class="prod-grid">
  <div th:each="p : ${productos}" class="prod-card">

    <!-- Badge estado -->
    <div class="prod-estado">
      <span th:if="${p.stock == 0}"         class="pestado pestado-sin">Sin stock</span>
      <span th:if="${p.stock > 0 and p.stock <= p.stockMinimo}" class="pestado pestado-bajo">Stock bajo</span>
      <span th:if="${p.stock > p.stockMinimo}" class="pestado pestado-ok">Disponible</span>
    </div>

    <!-- Imagen real o ícono -->
    <div class="prod-img-wrap">
      <img th:if="${p.imagen != null and !p.imagen.isEmpty()}"
           th:src="${p.imagen}" alt="producto"
           style="width:100%;height:170px;object-fit:contain;padding:16px;background:#f8f8f8;"/>
      <div th:if="${p.imagen == null or p.imagen.isEmpty()}"
           class="prod-img-placeholder" th:attr="data-cat=${p.categoria != null ? p.categoria.nombre : ''}">
        <i class="fa-solid fa-soap"         th:if="${p.categoria != null and p.categoria.nombre == 'shampoo'}"></i>
        <i class="fa-solid fa-star"         th:if="${p.categoria != null and p.categoria.nombre == 'cera'}"></i>
        <i class="fa-solid fa-wind"         th:if="${p.categoria != null and p.categoria.nombre == 'ambientador'}"></i>
        <i class="fa-solid fa-broom"        th:if="${p.categoria != null and p.categoria.nombre == 'limpieza'}"></i>
        <i class="fa-solid fa-shield-heart" th:if="${p.categoria != null and p.categoria.nombre == 'cuidado'}"></i>
        <i class="fa-solid fa-gears"        th:if="${p.categoria != null and p.categoria.nombre == 'motor'}"></i>
        <i class="fa-solid fa-toolbox"      th:if="${p.categoria != null and p.categoria.nombre == 'accesorios'}"></i>
        <i class="fa-solid fa-box"          th:if="${p.categoria == null}"></i>
      </div>

      <!-- Badge categoría sobre imagen -->
      <div th:if="${p.categoria != null}" class="cat-badge" th:text="${p.categoria.nombre}"></div>
    </div>

    <!-- Info -->
    <div class="prod-body">
      <div class="prod-nombre" th:text="${p.nombre}"></div>
      <div class="prod-desc" th:text="${p.descripcion}"
           th:if="${p.descripcion != null and !p.descripcion.isEmpty()}"></div>
      <div class="prod-stock-row">
        <i class="fa-solid fa-cubes" style="font-size:11px;color:var(--text-muted)"></i>
        <span th:text="'Stock: '+${p.stock}+' '+(p.unidad!=null?p.unidad:'')"
              th:style="${p.stock==0}?'color:var(--danger);font-weight:700':(${p.stock<=p.stockMinimo}?'color:var(--warning);font-weight:700':'color:var(--text-muted)')"></span>
      </div>
      <div class="prod-precio">S/ <span th:text="${#numbers.formatDecimal(p.precio,1,'COMMA',2,'POINT')}"></span></div>
    </div>

    <!-- Acciones -->
    <div class="prod-acciones">
      <a th:href="@{/ventas/nueva}" class="btn-vender">
        <i class="fa-solid fa-bag-shopping"></i> Agregar al carrito
      </a>
      <div class="prod-iconos">
        <a th:href="@{/productos/editar/{id}(id=${p.id})}" class="btn-icono" title="Editar">
          <i class="fa-solid fa-pen"></i>
        </a>
        <a th:href="@{/productos/eliminar/{id}(id=${p.id})}" class="btn-icono btn-icono-del"
           onclick="return confirm('¿Eliminar este producto?')" title="Eliminar">
          <i class="fa-solid fa-trash"></i>
        </a>
      </div>
    </div>

  </div>
</div>

<style>
.filter-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:12.5px;font-weight:600;text-decoration:none;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-secondary);transition:all .15s;cursor:pointer;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:16px;}
.prod-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:transform .2s,box-shadow .2s;}
.prod-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.12);}

.prod-estado{position:absolute;top:10px;left:10px;z-index:2;}
.pestado{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pestado-ok{background:#eafaf1;color:#1e8449;}
.pestado-bajo{background:#fef9e7;color:#9a7d0a;}
.pestado-sin{background:#fdedec;color:#922b21;}

.prod-img-wrap{background:#f8f8f8;height:170px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);position:relative;}
.prod-img-placeholder{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;background:rgba(192,57,43,.08);color:var(--accent);}

.cat-badge{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.45);color:#fff;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:600;text-transform:capitalize;}

.prod-body{padding:14px 14px 8px;flex:1;}
.prod-nombre{font-size:14px;font-weight:700;color:var(--text-primary);font-family:var(--font-display);line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-desc{font-size:12px;color:var(--text-muted);margin-bottom:6px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.prod-stock-row{display:flex;align-items:center;gap:5px;font-size:12px;margin-bottom:10px;}
.prod-precio{font-size:20px;font-weight:800;color:var(--accent);font-family:var(--font-display);}

.prod-acciones{padding:10px 14px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.btn-vender{flex:1;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 10px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;transition:background .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-vender:hover{background:#a93226;color:#fff;}
.prod-iconos{display:flex;gap:6px;}
.btn-icono{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:13px;text-decoration:none;transition:all .15s;cursor:pointer;}
.btn-icono:hover{border-color:var(--accent);color:var(--accent);}
.btn-icono-del:hover{border-color:#e74c3c;color:#e74c3c;}
</style>
</div>
</body>
</html>
